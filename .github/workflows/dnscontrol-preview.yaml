name: Preview DNS Changes

on:
  pull_request:
    branches:
      - 'main'
    paths:
      - '/dnsconfig.js'
      - '/creds.json'
      - '/domains/*.js'

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: DNSControl Preview
        uses: DNSControl/dnscontrol-action
        with:
          check: true
          cmdargs: preview
          post_pr_comment: true
          post_summary: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

