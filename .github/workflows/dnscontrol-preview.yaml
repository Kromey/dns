name: Preview DNS Changes

on:
  pull_request:
    branches:
      - 'main'
    paths:
      - 'dnsconfig.js'
      - 'creds.json'
      - 'domains/*.js'

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: DNSControl Preview
        uses: DNSControl/dnscontrol-action@6c99137eebf667295447b7fd2ec443e51b53a48e
        with:
          check: true
          cmdargs: preview
          post_summary: true
          output_file: 'dnscontrol.log'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Build PR Comment
        id: build_content
        run: |
          PREVIEW_LOG=$(sed -e 's/#[0-9]\+:\s*//' dnscontrol.log)
          
          BODY="<details open><summary>DNSControl Results</summary>

          ### DNSControl Results

          \\\`\\\`\\\`diff
          $PREVIEW_LOG
          \\\`\\\`\\\`
          </details>"
          
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Add Comment to PR
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${{ steps.build_content.outputs.body }}`
            })
