name: "DNS Nightly Sync Checker"

on:
  schedule:
    - cron: '0 2 * * *' # Fires nightly at 2:00 AM
      timezone: "America/Anchorage"
  workflow_dispatch:   # Allows manual trigger for testing

jobs:
  check-sync:
    runs-on: ubuntu-latest
    permissions:
      issues: write # Required to create, edit, comment, and close issues
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. RUN PREVIEW (Always runs to get the absolute current live status)
      - name: DNSControl Preview
        id: dns_preview
        uses: DNSControl/dnscontrol-action@6c99137eebf667295447b7fd2ec443e51b53a48e
        continue-on-error: true
        with:
          cmdargs: preview --expect-no-changes
          post_summary: true
          output_file: 'dnscontrol.log'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # 2. SEARCH FOR AN EXISTING OPEN TRACKING ISSUE
      - name: Search for Open Desync Issue
        id: find_issue
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'dns-out-of-sync'
            });
            
            if (issues.data.length > 0) {
              core.setOutput('issue_id', issues.data[0].number);
              console.log(`Found existing open out-of-sync issue #${issues.data[0].number}`);
            } else {
              core.setOutput('issue_id', '');
            }

      # 3. CASE A: SYSTEM IS BACK IN SYNC (Exit code is 0, but an issue is still open)
      - name: Auto-Close Issue If Fixed Manually
        if: steps.dns_preview.outcome == 'success' && steps.find_issue.outputs.issue_id != ''
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number("${{ steps.find_issue.outputs.issue_id }}");
            const commentBody = "🤖 **System Auto-Correction:** The nightly sync check found zero discrepancies. The live environment is back in sync with your Git files. Closing tracking issue automatically.";
            
            // Post notification comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: commentBody
            });

            // Close the issue
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed',
              state_reason: 'completed'
            });
            console.log(`Successfully auto-closed issue #${issueNumber}`);

      # 4. CONSTRUCT MARKDOWN BODY (Only used if system is confirmed out-of-sync)
      - name: Build Issue Content
        if: steps.dns_preview.outcome != 'success'
        id: build_content
        run: |
          PREVIEW_LOG=$(cat dnscontrol.log)
          CURRENT_DATE=$(TZ='America/Anchorage' date +"%Y-%m-%d %H:%M %Z")
          
          BODY="### ⚠️ Out-of-Sync DNS Changes Detected
          The local DNS configuration files do not match your live provider environments. Closing this issue will automatically execute \\\`dnscontrol push\\\` to re-sync production to your Git source of truth.
          
          *Last checked/updated: $CURRENT_DATE*
          
          #### 📋 Current Planned Adjustments:
          \\\`\\\`\\\`text
          $PREVIEW_LOG
          \\\`\\\`\\\`"
          
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # 5. CASE B: OUT OF SYNC & NO TRACKING ISSUE EXISTS -> CREATE IT
      - name: Create New Out-of-Sync Issue
        if: steps.dns_preview.outcome != 'success' && steps.find_issue.outputs.issue_id == ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Out-of-Sync DNS Records Found",
              body: `${{ steps.build_content.outputs.body }}`,
              labels: ['dns-out-of-sync']
            });

      # 6. CASE C: OUT OF SYNC & TRACKING ISSUE ALREADY EXISTS -> UPDATE & COMMENT
      - name: Update Existing Issue and Post Notification Comment
        if: steps.dns_preview.outcome != 'success' && steps.find_issue.outputs.issue_id != ''
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number("${{ steps.find_issue.outputs.issue_id }}");
            
            // Step 1: Update the description main text box
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `${{ steps.build_content.outputs.body }}`
            });

            // Step 2: Leave an alert comment in the discussion log
            const noticeComment = `🔄 **Notice:** The execution plan was updated. Please review the current plan in the main description description before closing this issue.`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: noticeComment
            });
            console.log(`Refreshed descriptions and appended a timeline comment to issue #${issueNumber}`);

